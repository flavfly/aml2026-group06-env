name: "base"
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults
dependencies:
  - python=3.9
  - numba
  - scikit-learn
  - pandas
  - numpy
  - seaborn
  - matplotlib
  - jupyterlab
  - xarray
  - tqdm
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
    - deepsmiles
    - rdkit
    - nltk
    - transformers==4.44.0
    - tokenizers==0.19.1
    - datasets
    - evaluate
    - accelerate
    - joblib
prefix: "/opt/conda"
