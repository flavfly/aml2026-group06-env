name: "base"
channels:
  # important: do not use 'defaults', but always include 'nodedefaults'
  - conda-forge
  - nodefaults
dependencies:
  - python=3.9 # set your python version here
  - tensorflow-gpu
  - numba
  - scikit-learn
  - pandas
  - seaborn
  - matplotlib
  - jupyterlab
  - xarray
  - pip
  - pip:
    - deepsmiles
    - rdkit
# Note: prefix can be changed
prefix: "/opt/conda"